name: Release

# main'e her push'ta eklenti header'ındaki sürüm okunur. O sürüm için release
# henüz yoksa zip derlenir, tag atılır ve GitHub Release yayınlanır. Sürümü
# yükseltmek için wp-remarketing.php'deki "Version:" alanını (ve readme.txt'deki
# "Stable tag" değerini) artırıp main'e push'lamak yeterli.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

# Aynı ref için release işlerini sıraya koy — eşzamanlı push'larda tag yarışını
# (iki run'ın da exists=false görüp aynı tag'i push etmeye çalışması) önler.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Auto tag & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tag'leri görebilmek için tüm geçmiş

      - name: Read plugin version
        id: ver
        run: |
          V=$(grep -oP '^\s*\*\s*Version:\s*\K[0-9A-Za-z.\-]+' wp-remarketing.php | head -n1)
          if [ -z "$V" ]; then
            echo "::error::wp-remarketing.php içinde Version bulunamadı"; exit 1
          fi
          echo "version=$V"  >> "$GITHUB_OUTPUT"
          echo "tag=v$V"     >> "$GITHUB_OUTPUT"
          echo "Sürüm: $V"

      - name: Verify readme Stable tag matches header
        run: |
          ST=$(grep -oP '^Stable tag:\s*\K[0-9A-Za-z.\-]+' readme.txt | head -n1)
          echo "readme Stable tag: $ST / header: ${{ steps.ver.outputs.version }}"
          if [ "$ST" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::readme.txt Stable tag ($ST), header Version (${{ steps.ver.outputs.version }}) ile uyuşmuyor"
            exit 1
          fi

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Tag yerine RELEASE varlığına bak: başarısız bir run'da tag pushlanmış
          # ama release oluşmamışsa tekrar denenebilsin (orphan-tag sorunu).
          if gh release view "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ steps.ver.outputs.tag }} release zaten var — atlanıyor"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        if: steps.check.outputs.exists == 'false'
        # git archive yalnızca takip edilen dosyaları paketler ve .gitattributes
        # export-ignore kurallarına uyar — stray dosya / dev artefaktı sızmaz.
        run: |
          git archive --format=zip --prefix=wp-remarketing/ -o wp-remarketing.zip HEAD

      - name: Create & push tag
        if: steps.check.outputs.exists == 'false'
        # Zip hazır olduktan SONRA tag atılır; paketleme patlarsa orphan tag kalmaz.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "::notice::${{ steps.ver.outputs.tag }} tag'i zaten var — yeniden atılmıyor"
          else
            git tag -a "${{ steps.ver.outputs.tag }}" \
              -m "WP Remarketing ${{ steps.ver.outputs.version }}"
            git push origin "${{ steps.ver.outputs.tag }}"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: WP Remarketing ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: wp-remarketing.zip
