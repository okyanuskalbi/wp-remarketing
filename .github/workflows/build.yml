name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '7.4', '8.2' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Syntax check all PHP files
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 \
            | xargs -0 -n1 -P4 php -l

  package:
    name: Package zip (artifact)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        # release.yml ile aynı paketleme: git archive + .gitattributes export-ignore.
        run: |
          git archive --format=zip --prefix=wp-remarketing/ -o wp-remarketing.zip HEAD

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-remarketing-zip
          path: wp-remarketing.zip
          if-no-files-found: error
