name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '7.4', '8.2' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Syntax check all PHP files
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 \
            | xargs -0 -n1 -P4 php -l

  package:
    name: Package zip (artifact)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          SLUG=wp-remarketing
          mkdir -p "build/$SLUG"
          rsync -a --exclude='.git' --exclude='.github' --exclude='build' \
            --exclude='*.zip' ./ "build/$SLUG/"
          cd build && zip -rq "$SLUG.zip" "$SLUG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-remarketing-zip
          path: build/wp-remarketing.zip
          if-no-files-found: error
